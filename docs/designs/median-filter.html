<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Verve — Median Filter Design</title>
  <style>
    /* ── Design tokens ──────────────────────────────────────────────────────── */
    :root {
      --color-bg:             #3c3c3c;
      --color-surface:        #2d2d2d;
      --color-surface-hover:  #4a4a4a;
      --color-border:         #191919;
      --color-border-light:   #555555;
      --color-text:           #d4d4d4;
      --color-text-dim:       #aaaaaa;
      --color-text-muted:     #7a7a7a;
      --color-accent:         #0699fb;
      --color-accent-hover:   #1aa3ff;
      --color-danger:         #c04040;
      --font-sans:            -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-sm:            2px;
      --radius-md:            3px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-bg);
      font-family: var(--font-sans);
      color: var(--color-text);
      min-height: 100vh;
    }

    /* ── Panel ──────────────────────────────────────────────────────────────── */
    .panel {
      position: fixed;
      top: 80px;
      right: 280px;
      width: 284px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6), 0 1px 3px rgba(0, 0, 0, 0.4);
      z-index: 300;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 26px;
      padding: 0 6px 0 8px;
      background: #262626;
      border-bottom: 1px solid var(--color-border);
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      flex-shrink: 0;
    }

    .header-icon {
      flex-shrink: 0;
      color: var(--color-accent);
      display: flex;
      align-items: center;
    }

    .title {
      flex: 1;
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text);
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .close-btn {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--color-text-muted);
      cursor: default;
      flex-shrink: 0;
      padding: 0;
    }
    .close-btn:hover {
      background: rgba(192, 64, 64, 0.2);
      color: #e07070;
    }

    /* ── Body ───────────────────────────────────────────────────────────────── */
    .body {
      padding: 10px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Slider row ─────────────────────────────────────────────────────────── */
    .row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
    }

    .label {
      width: 46px;
      flex-shrink: 0;
      font-size: 11px;
      color: var(--color-text-dim);
      white-space: nowrap;
    }

    /* ── Range slider ───────────────────────────────────────────────────────── */
    .slider {
      flex: 1;
      height: 3px;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      min-width: 0;
      background: linear-gradient(
        to right,
        var(--color-accent) 0%,
        var(--color-accent) var(--pct, 0%),
        var(--color-border-light) var(--pct, 0%),
        var(--color-border-light) 100%
      );
    }
    .slider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--color-text);
      border: 1px solid var(--color-border-light);
      cursor: pointer;
      transition: background 80ms;
    }
    .slider:hover::-webkit-slider-thumb  { background: #fff; }
    .slider:focus::-webkit-slider-thumb  {
      background: var(--color-accent);
      border-color: var(--color-accent);
      box-shadow: 0 0 0 2px rgba(6, 153, 251, 0.18);
    }
    .slider::-moz-range-thumb {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--color-text);
      border: 1px solid var(--color-border-light);
      cursor: pointer;
    }

    /* ── Number input ───────────────────────────────────────────────────────── */
    .number-input {
      width: 44px;
      height: 18px;
      padding: 0 4px;
      background: var(--color-bg);
      border: 1px solid var(--color-border-light);
      border-radius: 2px;
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--color-text);
      text-align: right;
      outline: none;
      flex-shrink: 0;
      appearance: textfield;
      -moz-appearance: textfield;
    }
    .number-input::-webkit-outer-spin-button,
    .number-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .number-input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 1px rgba(6, 153, 251, 0.45);
    }

    .unit {
      font-size: 10px;
      color: var(--color-text-muted);
      flex-shrink: 0;
      width: 14px;
      text-align: left;
    }

    /* ── Preview indicator ──────────────────────────────────────────────────── */
    .preview-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      background: rgba(6, 153, 251, 0.07);
      border: 1px solid rgba(6, 153, 251, 0.18);
      border-radius: 2px;
      font-size: 10px;
      color: var(--color-accent);
    }

    .spinner {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
      border: 1.5px solid rgba(6, 153, 251, 0.25);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 700ms linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .preview-params {
      margin-left: auto;
      font-size: 10px;
      color: rgba(6, 153, 251, 0.6);
      font-variant-numeric: tabular-nums;
    }

    /* ── Selection note ─────────────────────────────────────────────────────── */
    .selection-note {
      display: flex;
      align-items: flex-start;
      gap: 5px;
      padding: 4px 6px;
      background: rgba(255, 200, 80, 0.06);
      border: 1px solid rgba(255, 200, 80, 0.18);
      border-radius: 2px;
    }

    .selection-note-icon {
      flex-shrink: 0;
      margin-top: 0.5px;
      color: #c8a030;
      display: flex;
      align-items: center;
    }

    .selection-note-text {
      font-size: 10px;
      color: #c8a030;
      line-height: 1.4;
    }

    /* ── Error message ──────────────────────────────────────────────────────── */
    .error-message {
      font-size: 10px;
      color: #e07070;
      padding: 3px 6px;
      background: rgba(192, 64, 64, 0.1);
      border: 1px solid rgba(192, 64, 64, 0.28);
      border-radius: 2px;
    }

    /* ── Footer ─────────────────────────────────────────────────────────────── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      padding: 7px 10px 9px;
      border-top: 1px solid var(--color-border);
    }

    .btn-cancel {
      height: 22px;
      padding: 0 12px;
      background: transparent;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--color-text-dim);
      cursor: default;
      transition: background 80ms, color 80ms, border-color 80ms;
    }
    .btn-cancel:hover {
      background: var(--color-surface-hover);
      border-color: var(--color-text-muted);
      color: var(--color-text);
    }

    .btn-apply {
      height: 22px;
      padding: 0 14px;
      background: var(--color-accent);
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-family: var(--font-sans);
      color: #fff;
      font-weight: 500;
      cursor: default;
      transition: background 80ms;
    }
    .btn-apply:hover  { background: var(--color-accent-hover); }
    .btn-apply:active { background: #057dd4; }

    /* ── Utility ────────────────────────────────────────────────────────────── */
    .hidden { display: none !important; }

    .panel.dismissed {
      opacity: 0.3;
      pointer-events: none;
    }

    /* ── Prototype controls ─────────────────────────────────────────────────── */
    .proto-controls {
      position: fixed;
      top: 80px;
      left: 24px;
      background: rgba(22, 22, 22, 0.97);
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      z-index: 500;
      min-width: 196px;
    }
    .proto-controls h4 {
      font-size: 10px;
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding-bottom: 5px;
      border-bottom: 1px solid #2e2e2e;
    }
    .proto-controls label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--color-text-dim);
      cursor: pointer;
    }
    .proto-controls input[type="checkbox"] {
      accent-color: var(--color-accent);
      cursor: pointer;
    }
    .proto-note {
      font-size: 10px;
      color: var(--color-text-muted);
      margin-top: 2px;
      line-height: 1.45;
    }

    .proto-restore {
      height: 21px;
      padding: 0 10px;
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--color-text-dim);
      cursor: pointer;
      transition: background 80ms, color 80ms;
    }
    .proto-restore:hover {
      background: #2a2a2a;
      color: var(--color-text);
    }
  </style>
</head>
<body>

<!-- ── Prototype state controls ─────────────────────────────────────────────── -->
<div class="proto-controls" aria-label="Prototype controls">
  <h4>Prototype States</h4>
  <label>
    <input type="checkbox" id="chk-preview">
    Show preview indicator
  </label>
  <label>
    <input type="checkbox" id="chk-selection">
    Show selection note
  </label>
  <label>
    <input type="checkbox" id="chk-error">
    Show error message
  </label>
  <button class="proto-restore hidden" id="btn-restore">↺ Restore dialog</button>
  <p class="proto-note">Drag slider or type a value (1–10).<br>Apply/Cancel dim the panel.</p>
</div>

<!-- ── Median Filter dialog panel ───────────────────────────────────────────── -->
<div class="panel" id="panel" role="dialog" aria-modal="true" aria-label="Median Filter">

  <!-- Header ──────────────────────────────────────────────────────────────── -->
  <div class="header">
    <span class="header-icon" aria-hidden="true">
      <!--
        Median Filter icon: 3×3 neighbourhood grid of circles.
        The center cell is solid (the "median" value selected from
        the sorted neighbourhood). Outer 8 cells are stroked outlines.
        12×12 viewBox, currentColor.
      -->
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <!-- Row 1: top-left, top-center, top-right -->
        <circle cx="2.2" cy="2.2" r="1.1" stroke="currentColor" stroke-width="0.9" opacity="0.4"/>
        <circle cx="6.0" cy="2.2" r="1.1" stroke="currentColor" stroke-width="0.9" opacity="0.4"/>
        <circle cx="9.8" cy="2.2" r="1.1" stroke="currentColor" stroke-width="0.9" opacity="0.4"/>
        <!-- Row 2: mid-left, center (solid = selected median), mid-right -->
        <circle cx="2.2" cy="6.0" r="1.1" stroke="currentColor" stroke-width="0.9" opacity="0.4"/>
        <circle cx="6.0" cy="6.0" r="1.5" fill="currentColor"/>
        <circle cx="9.8" cy="6.0" r="1.1" stroke="currentColor" stroke-width="0.9" opacity="0.4"/>
        <!-- Row 3: bottom-left, bottom-center, bottom-right -->
        <circle cx="2.2" cy="9.8" r="1.1" stroke="currentColor" stroke-width="0.9" opacity="0.4"/>
        <circle cx="6.0" cy="9.8" r="1.1" stroke="currentColor" stroke-width="0.9" opacity="0.4"/>
        <circle cx="9.8" cy="9.8" r="1.1" stroke="currentColor" stroke-width="0.9" opacity="0.4"/>
      </svg>
    </span>
    <span class="title">Median Filter</span>
    <button class="close-btn" id="btn-close" aria-label="Cancel (Esc)" title="Cancel (Esc)">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" width="10" height="10" aria-hidden="true">
        <line x1="2" y1="2" x2="10" y2="10"/>
        <line x1="10" y1="2" x2="2" y2="10"/>
      </svg>
    </button>
  </div>

  <!-- Body ────────────────────────────────────────────────────────────────── -->
  <div class="body">

    <!-- Radius row ──────────────────────────────────────────────────────────── -->
    <div class="row">
      <span class="label" id="lbl-radius">Radius</span>
      <input
        type="range"
        class="slider"
        id="radius-slider"
        min="1" max="10" step="1" value="1"
        aria-labelledby="lbl-radius"
        style="--pct: 0%"
      >
      <input
        type="number"
        class="number-input"
        id="radius-input"
        min="1" max="10" step="1" value="1"
        aria-label="Radius in pixels"
      >
      <span class="unit">px</span>
    </div>

    <!-- Preview indicator (hidden by default) ──────────────────────────────── -->
    <div class="preview-indicator hidden" id="preview-indicator" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      Previewing…
      <span class="preview-params" id="preview-params">Radius: 1 px</span>
    </div>

    <!-- Selection note (hidden by default) ─────────────────────────────────── -->
    <div class="selection-note hidden" id="selection-note" role="note">
      <span class="selection-note-icon" aria-hidden="true">
        <svg viewBox="0 0 11 11" fill="none" width="10" height="10">
          <rect x="1" y="1" width="9" height="9" rx="1"
                stroke="currentColor" stroke-width="1"
                stroke-dasharray="2 1.5" fill="none"/>
        </svg>
      </span>
      <span class="selection-note-text">Selection active — filter applies only within the selected area.</span>
    </div>

    <!-- Error message (hidden by default) ──────────────────────────────────── -->
    <div class="error-message hidden" id="error-message" role="alert">
      Failed to apply Median Filter: could not read layer pixels.
    </div>

  </div><!-- /body -->

  <!-- Footer ──────────────────────────────────────────────────────────────── -->
  <div class="footer">
    <button class="btn-cancel" id="btn-cancel">Cancel</button>
    <button class="btn-apply"  id="btn-apply">Apply</button>
  </div>

</div><!-- /panel -->

<script>
(function () {
  'use strict';

  var currentRadius  = 1;
  var debounceTimer  = null;

  var panel         = document.getElementById('panel');
  var radiusSlider  = document.getElementById('radius-slider');
  var radiusInput   = document.getElementById('radius-input');
  var previewInd    = document.getElementById('preview-indicator');
  var previewParams = document.getElementById('preview-params');
  var btnRestore    = document.getElementById('btn-restore');

  function clampRadius(v) {
    var n = parseInt(v, 10);
    if (isNaN(n)) n = 1;
    return Math.max(1, Math.min(10, n));
  }

  function setFill(v) {
    /* range 1–10, so offset by 1 */
    radiusSlider.style.setProperty('--pct', ((v - 1) / 9 * 100).toFixed(2) + '%');
  }

  function syncRadius(v) {
    currentRadius        = clampRadius(v);
    radiusSlider.value   = currentRadius;
    radiusInput.value    = currentRadius;
    setFill(currentRadius);
    previewParams.textContent = 'Radius:\u2009' + currentRadius + '\u202fpx';
  }

  function triggerDebounce() {
    previewInd.classList.remove('hidden');
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function () {
      previewInd.classList.add('hidden');
    }, 900);
  }

  radiusSlider.addEventListener('input', function () {
    syncRadius(radiusSlider.value);
    triggerDebounce();
  });

  radiusInput.addEventListener('input', function () {
    var raw = radiusInput.value;
    if (raw === '') return;
    syncRadius(raw);
    triggerDebounce();
  });

  radiusInput.addEventListener('blur', function () { syncRadius(radiusInput.value); });

  radiusInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { syncRadius(radiusInput.value); radiusInput.blur(); }
  });

  /* Prototype state toggles */
  [
    ['chk-preview',   'preview-indicator'],
    ['chk-selection', 'selection-note'],
    ['chk-error',     'error-message']
  ].forEach(function (pair) {
    var chk    = document.getElementById(pair[0]);
    var target = document.getElementById(pair[1]);
    if (!chk || !target) return;
    chk.addEventListener('change', function () {
      target.classList.toggle('hidden', !chk.checked);
    });
  });

  function dismissPanel() {
    panel.classList.add('dismissed');
    btnRestore.classList.remove('hidden');
  }

  document.getElementById('btn-apply').addEventListener('click',  dismissPanel);
  document.getElementById('btn-cancel').addEventListener('click', dismissPanel);
  document.getElementById('btn-close').addEventListener('click',  dismissPanel);

  btnRestore.addEventListener('click', function () {
    panel.classList.remove('dismissed');
    btnRestore.classList.add('hidden');
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') dismissPanel();
  });

  syncRadius(1);

}());
</script>

</body>
</html>
