<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Verve — Radial Blur Design</title>
  <style>
    /* ── Design tokens ────────────────────────────────────────────────────── */
    :root {
      --color-bg:             #3c3c3c;
      --color-surface:        #2d2d2d;
      --color-surface-2:      #323232;
      --color-surface-hover:  #4a4a4a;
      --color-border:         #191919;
      --color-border-light:   #555555;
      --color-text:           #d4d4d4;
      --color-text-dim:       #aaaaaa;
      --color-text-muted:     #7a7a7a;
      --color-accent:         #0699fb;
      --color-accent-hover:   #1aa3ff;
      --color-danger:         #c04040;
      --font-sans:            -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-sm:            2px;
      --radius-md:            3px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-bg);
      font-family: var(--font-sans);
      color: var(--color-text);
      min-height: 100vh;
    }

    /* ── Panel ────────────────────────────────────────────────────────────── */
    .panel {
      position: fixed;
      top: 80px;
      right: 280px;
      width: 284px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6), 0 1px 3px rgba(0, 0, 0, 0.4);
      z-index: 300;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 26px;
      padding: 0 6px 0 8px;
      background: #262626;
      border-bottom: 1px solid var(--color-border);
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      flex-shrink: 0;
    }

    .header-icon {
      flex-shrink: 0;
      color: var(--color-accent);
      display: flex;
      align-items: center;
    }

    .title {
      flex: 1;
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text);
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .close-btn {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--color-text-muted);
      cursor: default;
      flex-shrink: 0;
      padding: 0;
    }
    .close-btn:hover {
      background: rgba(192, 64, 64, 0.2);
      color: #e07070;
    }

    /* ── Body ─────────────────────────────────────────────────────────────── */
    .body {
      padding: 10px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Row ──────────────────────────────────────────────────────────────── */
    .row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
    }

    .label {
      width: 46px;
      flex-shrink: 0;
      font-size: 11px;
      color: var(--color-text-dim);
      white-space: nowrap;
    }

    /* ── Slider ───────────────────────────────────────────────────────────── */
    .slider {
      flex: 1;
      height: 3px;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      background: var(--color-border-light);
      min-width: 0;
    }
    .slider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--color-text);
      border: 1px solid var(--color-border-light);
      cursor: pointer;
    }
    .slider::-webkit-slider-thumb:hover { background: #fff; }
    .slider::-moz-range-thumb {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--color-text);
      border: 1px solid var(--color-border-light);
      cursor: pointer;
    }

    /* ── Number input ─────────────────────────────────────────────────────── */
    .number-input {
      width: 44px;
      height: 18px;
      padding: 0 4px;
      background: var(--color-bg);
      border: 1px solid var(--color-border-light);
      border-radius: 2px;
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--color-text);
      text-align: right;
      outline: none;
      flex-shrink: 0;
      appearance: textfield;
      -moz-appearance: textfield;
    }
    .number-input::-webkit-outer-spin-button,
    .number-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .number-input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 1px rgba(6, 153, 251, 0.45);
    }

    .unit {
      font-size: 10px;
      color: var(--color-text-muted);
      flex-shrink: 0;
    }

    /* ── Toggle group ─────────────────────────────────────────────────────── */
    .toggle-group {
      display: flex;
      flex-shrink: 0;
    }

    .toggle-btn {
      height: 18px;
      padding: 0 10px;
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--color-text-muted);
      background: #1e1e1e;
      border: 1px solid var(--color-border-light);
      border-right-width: 0;
      cursor: default;
      white-space: nowrap;
      display: flex;
      align-items: center;
      line-height: 1;
      transition: background 80ms ease, color 80ms ease;
    }
    .toggle-btn:first-child {
      border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    }
    .toggle-btn:last-child {
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      border-right-width: 1px;
    }
    .toggle-btn:hover:not(.toggle-btn--active) {
      background: #2a2a2a;
      color: var(--color-text-dim);
    }
    .toggle-btn--active {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
      font-weight: 500;
    }
    /* Prevent double-border between active and adjacent */
    .toggle-btn--active + .toggle-btn {
      border-left-color: var(--color-accent);
    }

    /* ── Center picker ────────────────────────────────────────────────────── */
    .center-section {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .center-section > .label {
      /* sits on its own line; inherits .label width/color */
    }

    .center-picker {
      position: relative;
      width: 120px;
      height: 90px;
      background: #1a1a1a;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: crosshair;
      flex-shrink: 0;
    }

    .dot-grid {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .crosshair {
      position: absolute;
      width: 14px;
      height: 14px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .crosshair-h {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-0.5px);
    }
    .crosshair-v {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255, 255, 255, 0.9);
      transform: translateX(-0.5px);
    }

    .center-coords {
      font-size: 10px;
      color: var(--color-text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* ── Preview indicator ────────────────────────────────────────────────── */
    .preview-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      background: rgba(6, 153, 251, 0.07);
      border: 1px solid rgba(6, 153, 251, 0.18);
      border-radius: 2px;
      font-size: 10px;
      color: var(--color-accent);
    }

    .spinner {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
      border: 1.5px solid rgba(6, 153, 251, 0.25);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 700ms linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Selection note ───────────────────────────────────────────────────── */
    .selection-note {
      font-size: 10px;
      color: #d4941a;
      padding: 3px 6px;
      background: rgba(212, 148, 26, 0.08);
      border: 1px solid rgba(212, 148, 26, 0.22);
      border-radius: 2px;
    }

    /* ── Error message ────────────────────────────────────────────────────── */
    .error-message {
      font-size: 10px;
      color: #e07070;
      padding: 3px 6px;
      background: rgba(192, 64, 64, 0.1);
      border: 1px solid rgba(192, 64, 64, 0.28);
      border-radius: 2px;
    }

    /* ── Footer ───────────────────────────────────────────────────────────── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      padding: 7px 10px 9px;
      border-top: 1px solid var(--color-border);
    }

    .btn-cancel {
      height: 22px;
      padding: 0 12px;
      background: transparent;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--color-text-dim);
      cursor: default;
    }
    .btn-cancel:hover {
      background: var(--color-surface-hover);
      border-color: var(--color-text-muted);
      color: var(--color-text);
    }

    .btn-apply {
      height: 22px;
      padding: 0 12px;
      background: var(--color-accent);
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-family: var(--font-sans);
      color: #fff;
      cursor: default;
    }
    .btn-apply:hover { background: var(--color-accent-hover); }

    /* ── Utility ──────────────────────────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── Prototype controls ───────────────────────────────────────────────── */
    .proto-controls {
      position: fixed;
      top: 80px;
      left: 24px;
      background: rgba(26, 26, 26, 0.96);
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      z-index: 500;
      min-width: 190px;
    }
    .proto-controls h4 {
      font-size: 10px;
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding-bottom: 5px;
      border-bottom: 1px solid #333;
    }
    .proto-controls label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--color-text-dim);
      cursor: pointer;
    }
    .proto-controls input[type="checkbox"] {
      accent-color: var(--color-accent);
      cursor: pointer;
    }
    .proto-note {
      font-size: 10px;
      color: var(--color-text-muted);
      margin-top: 2px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<!-- ── Prototype state controls ──────────────────────────────────────────── -->
<div class="proto-controls" aria-label="Prototype controls">
  <h4>Prototype States</h4>
  <label>
    <input type="checkbox" id="chk-preview">
    Show preview indicator
  </label>
  <label>
    <input type="checkbox" id="chk-selection">
    Show selection note
  </label>
  <label>
    <input type="checkbox" id="chk-error">
    Show error message
  </label>
  <p class="proto-note">Drag the crosshair inside<br>the Center picker.</p>
</div>

<!-- ── Radial Blur panel ──────────────────────────────────────────────────── -->
<div class="panel" role="dialog" aria-label="Radial Blur">

  <!-- Header -->
  <div class="header">
    <span class="header-icon" aria-hidden="true">
      <!-- Radial blur icon: concentric arcs suggesting rotation + zoom -->
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <!-- Rotation arc (outer) -->
        <path d="M 2.2 6 A 3.8 3.8 0 0 1 9.8 6" stroke="currentColor" stroke-width="1.1"
              fill="none" stroke-linecap="round"/>
        <!-- Rotation arc (mid) -->
        <path d="M 3.4 6 A 2.6 2.6 0 0 1 8.6 6" stroke="currentColor" stroke-width="1.1"
              fill="none" opacity="0.6" stroke-linecap="round"/>
        <!-- Rotation arc (inner) -->
        <path d="M 4.6 6 A 1.4 1.4 0 0 1 7.4 6" stroke="currentColor" stroke-width="1.1"
              fill="none" opacity="0.25" stroke-linecap="round"/>
        <!-- Center dot -->
        <circle cx="6" cy="6" r="1" fill="currentColor"/>
      </svg>
    </span>
    <span class="title">Radial Blur</span>
    <button class="close-btn" aria-label="Close" title="Close">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" width="10" height="10" aria-hidden="true">
        <line x1="1" y1="1" x2="11" y2="11"/>
        <line x1="11" y1="1" x2="1" y2="11"/>
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- a. Mode row -->
    <div class="row">
      <span class="label">Mode</span>
      <div class="toggle-group" id="mode-group" role="group" aria-label="Blur mode">
        <button class="toggle-btn toggle-btn--active" data-value="spin" aria-pressed="true">Spin</button>
        <button class="toggle-btn" data-value="zoom" aria-pressed="false">Zoom</button>
      </div>
    </div>

    <!-- b. Amount row -->
    <div class="row">
      <span class="label">Amount</span>
      <input
        type="range"
        class="slider"
        id="amount-slider"
        min="1" max="100" step="1" value="44"
        aria-label="Amount"
      >
      <input
        type="number"
        class="number-input"
        id="amount-input"
        min="1" max="100" step="1" value="44"
        aria-label="Amount value"
      >
      <span class="unit">%</span>
    </div>

    <!-- c. Quality row -->
    <div class="row">
      <span class="label">Quality</span>
      <div class="toggle-group" id="quality-group" role="group" aria-label="Blur quality">
        <button class="toggle-btn" data-value="draft" aria-pressed="false">Draft</button>
        <button class="toggle-btn toggle-btn--active" data-value="good" aria-pressed="true">Good</button>
        <button class="toggle-btn" data-value="best" aria-pressed="false">Best</button>
      </div>
    </div>

    <!-- d. Center picker -->
    <div class="center-section">
      <span class="label">Center</span>
      <div>
        <div class="center-picker" id="center-picker" aria-label="Blur center position">
          <!-- 6×6 dot grid drawn by JS -->
          <svg class="dot-grid" id="dot-grid"
               xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 120 90"
               preserveAspectRatio="none">
          </svg>
          <!-- Draggable crosshair -->
          <div class="crosshair" id="crosshair" role="presentation">
            <div class="crosshair-h"></div>
            <div class="crosshair-v"></div>
          </div>
        </div>
        <span class="center-coords" id="center-coords">50% × 50%</span>
      </div>
    </div>

    <!-- e. Preview indicator (hidden by default) -->
    <div class="preview-indicator hidden" id="preview-indicator" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      Previewing…
    </div>

    <!-- f. Selection note (hidden by default) -->
    <div class="selection-note hidden" id="selection-note" role="note">
      Blur will be applied inside the selection only.
    </div>

    <!-- g. Error message (hidden by default) -->
    <div class="error-message hidden" id="error-message" role="alert">
      Failed to apply Radial Blur: could not read layer pixels.
    </div>

  </div><!-- /body -->

  <!-- Footer -->
  <div class="footer">
    <button class="btn-cancel">Cancel</button>
    <button class="btn-apply">Apply</button>
  </div>

</div><!-- /panel -->

<script>
(function () {
  'use strict'

  // ── Dot grid ──────────────────────────────────────────────────────────────
  var svg = document.getElementById('dot-grid')
  var ns = 'http://www.w3.org/2000/svg'
  var COLS = 6, ROWS = 6
  var W = 120, H = 90
  // Distribute dots with even margins (one half-step on each side)
  var xStep = W / COLS        // 20px
  var yStep = H / ROWS        // 15px
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var cx = (c + 0.5) * xStep
      var cy = (r + 0.5) * yStep
      var dot = document.createElementNS(ns, 'circle')
      dot.setAttribute('cx', cx.toFixed(1))
      dot.setAttribute('cy', cy.toFixed(1))
      dot.setAttribute('r', '1.1')
      dot.setAttribute('fill', 'rgba(255,255,255,0.16)')
      svg.appendChild(dot)
    }
  }

  // ── Center picker: drag crosshair ─────────────────────────────────────────
  var picker      = document.getElementById('center-picker')
  var crosshair   = document.getElementById('crosshair')
  var coordsLabel = document.getElementById('center-coords')
  var dragging    = false
  var pctX = 50, pctY = 50

  function renderCrosshair () {
    var w = picker.offsetWidth  || 120
    var h = picker.offsetHeight || 90
    crosshair.style.left = (pctX / 100 * w).toFixed(1) + 'px'
    crosshair.style.top  = (pctY / 100 * h).toFixed(1) + 'px'
    coordsLabel.textContent = pctX.toFixed(0) + '% \u00d7 ' + pctY.toFixed(0) + '%'
  }

  function posFromEvent (e) {
    var rect = picker.getBoundingClientRect()
    var x = Math.max(0, Math.min(rect.width,  e.clientX - rect.left))
    var y = Math.max(0, Math.min(rect.height, e.clientY - rect.top))
    pctX = Math.round(x / rect.width  * 100)
    pctY = Math.round(y / rect.height * 100)
    renderCrosshair()
  }

  picker.addEventListener('mousedown', function (e) {
    if (e.button !== 0) return
    dragging = true
    posFromEvent(e)
    e.preventDefault()
  })
  window.addEventListener('mousemove', function (e) {
    if (!dragging) return
    posFromEvent(e)
  })
  window.addEventListener('mouseup', function (e) {
    if (e.button !== 0) return
    dragging = false
  })

  // Set initial position after layout
  requestAnimationFrame(renderCrosshair)

  // ── Amount slider ↔ number input bidirectional sync ────────────────────────
  var slider     = document.getElementById('amount-slider')
  var numInput   = document.getElementById('amount-input')

  function clampAmount (v) {
    var n = Math.round(parseFloat(v))
    if (isNaN(n)) n = 1
    return Math.max(1, Math.min(100, n))
  }

  slider.addEventListener('input', function () {
    var v = clampAmount(slider.value)
    slider.value   = v
    numInput.value = v
  })

  numInput.addEventListener('input', function () {
    var v = clampAmount(numInput.value)
    slider.value = v
    // Don't clamp textfield mid-type so user can type e.g. "100"
  })

  numInput.addEventListener('blur', function () {
    var v = clampAmount(numInput.value)
    numInput.value = v
    slider.value   = v
  })

  numInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      var v = clampAmount(numInput.value)
      numInput.value = v
      slider.value   = v
      numInput.blur()
    }
  })

  // ── Toggle groups: Mode + Quality ─────────────────────────────────────────
  ;['mode-group', 'quality-group'].forEach(function (id) {
    var group = document.getElementById(id)
    if (!group) return
    group.addEventListener('click', function (e) {
      var btn = e.target.closest('.toggle-btn')
      if (!btn) return
      group.querySelectorAll('.toggle-btn').forEach(function (b) {
        b.classList.remove('toggle-btn--active')
        b.setAttribute('aria-pressed', 'false')
      })
      btn.classList.add('toggle-btn--active')
      btn.setAttribute('aria-pressed', 'true')
    })
  })

  // ── Prototype state toggles ────────────────────────────────────────────────
  var statePairs = [
    ['chk-preview',   'preview-indicator'],
    ['chk-selection', 'selection-note'],
    ['chk-error',     'error-message'],
  ]
  statePairs.forEach(function (pair) {
    var chk    = document.getElementById(pair[0])
    var target = document.getElementById(pair[1])
    if (!chk || !target) return
    chk.addEventListener('change', function () {
      target.classList.toggle('hidden', !chk.checked)
    })
  })

})()
</script>

</body>
</html>
