<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Verve — Render Lens Flare Design</title>
  <style>
    /* ── Design tokens ────────────────────────────────────────────────────── */
    :root {
      --color-bg:             #3c3c3c;
      --color-surface:        #2d2d2d;
      --color-surface-2:      #323232;
      --color-surface-hover:  #4a4a4a;
      --color-border:         #191919;
      --color-border-light:   #555555;
      --color-text:           #d4d4d4;
      --color-text-dim:       #aaaaaa;
      --color-text-muted:     #7a7a7a;
      --color-accent:         #0699fb;
      --color-accent-hover:   #1aa3ff;
      --color-danger:         #c04040;
      --font-sans:            -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-sm:            2px;
      --radius-md:            3px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-bg);
      font-family: var(--font-sans);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── Dialog panel ─────────────────────────────────────────────────────── */
    .panel {
      width: 580px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      box-shadow: 0 4px 24px rgba(0,0,0,0.65), 0 1px 4px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 26px;
      padding: 0 6px 0 8px;
      background: #262626;
      border-bottom: 1px solid var(--color-border);
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      flex-shrink: 0;
    }

    .header-icon {
      flex-shrink: 0;
      color: var(--color-accent);
      display: flex;
      align-items: center;
    }

    .title {
      flex: 1;
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text);
      letter-spacing: 0.01em;
    }

    .close-btn {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--color-text-muted);
      cursor: default;
      flex-shrink: 0;
      padding: 0;
    }
    .close-btn:hover {
      background: rgba(192, 64, 64, 0.2);
      color: #e07070;
    }

    /* ── Body ─────────────────────────────────────────────────────────────── */
    .body {
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    /* ── Left column: preview ─────────────────────────────────────────────── */
    .preview-col {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .preview-label {
      font-size: 10px;
      color: var(--color-text-muted);
      text-align: center;
    }

    .preview-wrap {
      position: relative;
      width: 280px;
      height: 180px;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: crosshair;
      background: #111;
    }

    .preview-wrap:hover {
      border-color: var(--color-accent);
    }

    #preview-canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    /* Crosshair marker overlay */
    .crosshair {
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
    }
    .crosshair::before,
    .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.85);
    }
    .crosshair::before {
      /* horizontal arm */
      left: 0; top: 50%; right: 0;
      height: 1px;
      transform: translateY(-50%);
    }
    .crosshair::after {
      /* vertical arm */
      top: 0; left: 50%; bottom: 0;
      width: 1px;
      transform: translateX(-50%);
    }
    /* small center dot */
    .crosshair-dot {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #fff;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
    }

    .preview-hint {
      font-size: 10px;
      color: var(--color-text-muted);
      text-align: center;
      line-height: 1.4;
    }

    /* ── Position readouts ────────────────────────────────────────────────── */
    .position-row {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }

    .pos-field {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .pos-label {
      font-size: 10px;
      color: var(--color-text-muted);
      font-variant-numeric: tabular-nums;
    }

    .pos-value {
      width: 44px;
      height: 18px;
      padding: 0 4px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 2px;
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--color-text-dim);
      text-align: right;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      outline: none;
    }

    .pos-unit {
      font-size: 10px;
      color: var(--color-text-muted);
    }

    .pos-sep {
      width: 1px;
      height: 12px;
      background: var(--color-border-light);
    }

    /* ── Right column: controls ───────────────────────────────────────────── */
    .controls-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    /* ── Section label ────────────────────────────────────────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding-bottom: 4px;
      border-bottom: 1px solid #383838;
    }

    /* ── Lens type radio group ────────────────────────────────────────────── */
    .lens-type-group {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 7px;
      height: 22px;
      padding: 0 5px;
      border-radius: var(--radius-sm);
      cursor: default;
    }

    .radio-option:hover {
      background: var(--color-surface-hover);
    }

    .radio-option.active {
      background: rgba(6, 153, 251, 0.12);
    }

    /* custom radio button */
    .radio-dot {
      flex-shrink: 0;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 1px solid var(--color-border-light);
      background: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .radio-option.active .radio-dot {
      border-color: var(--color-accent);
    }

    .radio-option.active .radio-dot::after {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--color-accent);
    }

    .radio-name {
      font-size: 11px;
      color: var(--color-text-dim);
      flex: 1;
    }

    .radio-option.active .radio-name {
      color: var(--color-text);
    }

    /* ── Divider ──────────────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: #383838;
    }

    /* ── Row (slider row) ─────────────────────────────────────────────────── */
    .row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
    }

    .label {
      width: 68px;
      flex-shrink: 0;
      font-size: 11px;
      color: var(--color-text-dim);
      white-space: nowrap;
    }

    /* ── Slider ───────────────────────────────────────────────────────────── */
    .slider {
      flex: 1;
      height: 3px;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      min-width: 0;
      background: linear-gradient(
        to right,
        var(--color-accent) 0%,
        var(--color-accent) var(--pct, 0%),
        var(--color-border-light) var(--pct, 0%),
        var(--color-border-light) 100%
      );
    }
    .slider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--color-text);
      border: 1px solid var(--color-border-light);
      cursor: pointer;
    }
    .slider:hover::-webkit-slider-thumb { background: #fff; }
    .slider:focus::-webkit-slider-thumb {
      background: var(--color-accent);
      border-color: var(--color-accent);
      box-shadow: 0 0 0 2px rgba(6,153,251,0.18);
    }
    .slider::-moz-range-thumb {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--color-text);
      border: 1px solid var(--color-border-light);
      cursor: pointer;
    }

    /* ── Number input ─────────────────────────────────────────────────────── */
    .number-input {
      width: 44px;
      height: 18px;
      padding: 0 4px;
      background: var(--color-bg);
      border: 1px solid var(--color-border-light);
      border-radius: 2px;
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--color-text);
      text-align: right;
      outline: none;
      flex-shrink: 0;
      appearance: textfield;
      -moz-appearance: textfield;
    }
    .number-input::-webkit-outer-spin-button,
    .number-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .number-input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 1px rgba(6,153,251,0.45);
    }

    .unit {
      font-size: 10px;
      color: var(--color-text-muted);
      flex-shrink: 0;
      width: 14px;
      text-align: left;
    }

    /* ── Footer ───────────────────────────────────────────────────────────── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      padding: 7px 10px 9px;
      border-top: 1px solid var(--color-border);
    }

    .btn-cancel {
      height: 22px;
      padding: 0 12px;
      background: transparent;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--color-text-dim);
      cursor: default;
    }
    .btn-cancel:hover {
      background: var(--color-surface-hover);
      border-color: var(--color-text-muted);
      color: var(--color-text);
    }

    .btn-apply {
      height: 22px;
      padding: 0 14px;
      background: var(--color-accent);
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-family: var(--font-sans);
      color: #fff;
      font-weight: 500;
      cursor: default;
    }
    .btn-apply:hover  { background: var(--color-accent-hover); }
    .btn-apply:active { background: #057dd4; }

    /* ── Dismissed state ──────────────────────────────────────────────────── */
    .panel.dismissed {
      opacity: 0.3;
      pointer-events: none;
      transition: opacity 150ms;
    }

    /* ── Prototype controls (sidebar) ─────────────────────────────────────── */
    .proto-sidebar {
      position: fixed;
      top: 40px;
      left: 24px;
      background: rgba(20,20,20,0.96);
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 500;
      min-width: 180px;
    }
    .proto-sidebar h4 {
      font-size: 10px;
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding-bottom: 5px;
      border-bottom: 1px solid #2e2e2e;
    }
    .proto-note {
      font-size: 10px;
      color: var(--color-text-muted);
      line-height: 1.45;
    }
    .proto-restore {
      height: 21px;
      padding: 0 10px;
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--color-text-dim);
      cursor: pointer;
    }
    .proto-restore:hover {
      background: #2a2a2a;
      color: var(--color-text);
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- ── Prototype sidebar ─────────────────────────────────────────────────── -->
<div class="proto-sidebar" aria-label="Prototype controls">
  <h4>Prototype</h4>
  <p class="proto-note">
    Click or drag the preview to<br>
    reposition the flare center.<br>
    Select a lens type or drag<br>
    the Brightness slider to<br>
    redraw the preview.
  </p>
  <button class="proto-restore hidden" id="btn-restore">↺ Restore dialog</button>
</div>

<!-- ── Render Lens Flare dialog ──────────────────────────────────────────── -->
<div class="panel" id="panel" role="dialog" aria-modal="true" aria-labelledby="dialog-title">

  <!-- Header ──────────────────────────────────────────────────────────────── -->
  <div class="header">
    <span class="header-icon" aria-hidden="true">
      <!--
        Lens flare icon: central starburst (4 pointed rays) with a small
        ring halo around it. 12×12, stroke-based, currentColor.
      -->
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <!-- Halo ring -->
        <circle cx="6" cy="6" r="3.5" stroke="currentColor" stroke-width="0.75" opacity="0.55"/>
        <!-- Horizontal ray -->
        <line x1="0.5" y1="6" x2="11.5" y2="6" stroke="currentColor" stroke-width="0.9" opacity="0.6" stroke-linecap="round"/>
        <!-- Vertical ray -->
        <line x1="6" y1="0.5" x2="6" y2="11.5" stroke="currentColor" stroke-width="0.9" opacity="0.6" stroke-linecap="round"/>
        <!-- Diagonal rays -->
        <line x1="2.0" y1="2.0" x2="4.2" y2="4.2" stroke="currentColor" stroke-width="0.75" opacity="0.4" stroke-linecap="round"/>
        <line x1="7.8" y1="7.8" x2="10.0" y2="10.0" stroke="currentColor" stroke-width="0.75" opacity="0.4" stroke-linecap="round"/>
        <line x1="10.0" y1="2.0" x2="7.8" y2="4.2" stroke="currentColor" stroke-width="0.75" opacity="0.4" stroke-linecap="round"/>
        <line x1="2.0" y1="10.0" x2="4.2" y2="7.8" stroke="currentColor" stroke-width="0.75" opacity="0.4" stroke-linecap="round"/>
        <!-- Central hot spot -->
        <circle cx="6" cy="6" r="1.2" fill="currentColor" opacity="0.9"/>
      </svg>
    </span>
    <span class="title" id="dialog-title">Render Lens Flare</span>
    <button class="close-btn" id="btn-close" aria-label="Cancel (Esc)" title="Cancel (Esc)">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" width="10" height="10" aria-hidden="true">
        <line x1="2" y1="2" x2="10" y2="10"/>
        <line x1="10" y1="2" x2="2" y2="10"/>
      </svg>
    </button>
  </div>

  <!-- Body ────────────────────────────────────────────────────────────────── -->
  <div class="body">

    <!-- Left column: interactive preview ──────────────────────────────────── -->
    <div class="preview-col">

      <div class="preview-wrap" id="preview-wrap" title="Click or drag to reposition the flare center">
        <canvas id="preview-canvas" width="280" height="180"></canvas>
        <!-- Crosshair marker — positioned via JS -->
        <div class="crosshair" id="crosshair" style="left:50%;top:50%">
          <div class="crosshair-dot"></div>
        </div>
      </div>

      <p class="preview-hint">Click or drag to position flare</p>

      <!-- X/Y readouts -->
      <div class="position-row" aria-label="Flare center position">
        <div class="pos-field">
          <span class="pos-label">X</span>
          <input type="text" class="pos-value" id="pos-x" value="640" readonly aria-label="Flare center X coordinate" tabindex="-1">
          <span class="pos-unit">px</span>
        </div>
        <div class="pos-sep"></div>
        <div class="pos-field">
          <span class="pos-label">Y</span>
          <input type="text" class="pos-value" id="pos-y" value="360" readonly aria-label="Flare center Y coordinate" tabindex="-1">
          <span class="pos-unit">px</span>
        </div>
      </div>

    </div><!-- /preview-col -->

    <!-- Right column: controls ─────────────────────────────────────────────── -->
    <div class="controls-col">

      <!-- Lens Type ────────────────────────────────────────────────────────── -->
      <div>
        <div class="section-label">Lens Type</div>
        <div class="lens-type-group" id="lens-type-group" role="radiogroup" aria-label="Lens type">

          <div class="radio-option active" data-type="zoom-50-300" role="radio" aria-checked="true" tabindex="0">
            <div class="radio-dot"></div>
            <span class="radio-name">50–300mm Zoom</span>
          </div>

          <div class="radio-option" data-type="prime-35" role="radio" aria-checked="false" tabindex="0">
            <div class="radio-dot"></div>
            <span class="radio-name">35mm Prime</span>
          </div>

          <div class="radio-option" data-type="prime-105" role="radio" aria-checked="false" tabindex="0">
            <div class="radio-dot"></div>
            <span class="radio-name">105mm Prime</span>
          </div>

          <div class="radio-option" data-type="movie-prime" role="radio" aria-checked="false" tabindex="0">
            <div class="radio-dot"></div>
            <span class="radio-name">Movie Prime</span>
          </div>

          <div class="radio-option" data-type="anamorphic" role="radio" aria-checked="false" tabindex="0">
            <div class="radio-dot"></div>
            <span class="radio-name">Cinematic / Anamorphic</span>
          </div>

        </div>
      </div>

      <div class="divider"></div>

      <!-- Brightness ───────────────────────────────────────────────────────── -->
      <div class="row">
        <span class="label" id="lbl-brightness">Brightness</span>
        <input
          type="range"
          class="slider"
          id="brightness-slider"
          min="10" max="300" step="1" value="100"
          aria-labelledby="lbl-brightness"
          style="--pct: 30.69%"
        >
        <input
          type="number"
          class="number-input"
          id="brightness-input"
          min="10" max="300" step="1" value="100"
          aria-label="Brightness percentage"
        >
        <span class="unit">%</span>
      </div>

    </div><!-- /controls-col -->

  </div><!-- /body -->

  <!-- Footer ──────────────────────────────────────────────────────────────── -->
  <div class="footer">
    <button class="btn-cancel" id="btn-cancel">Cancel</button>
    <button class="btn-apply"  id="btn-apply">Apply</button>
  </div>

</div><!-- /panel -->

<script>
(function () {
  'use strict';

  /* ── Canvas reference dimensions (simulates a 1280×720 canvas) ───────────── */
  const CANVAS_W = 1280;
  const CANVAS_H = 720;
  const THUMB_W  = 280;
  const THUMB_H  = 180;

  /* ── State ──────────────────────────────────────────────────────────────── */
  let lensType   = 'zoom-50-300';
  let brightness = 100;
  // Flare center in canvas coords, default = canvas center
  let flareX = CANVAS_W / 2;
  let flareY = CANVAS_H / 2;
  let dragging = false;
  let debounceTimer = null;

  /* ── DOM refs ────────────────────────────────────────────────────────────── */
  const canvas       = document.getElementById('preview-canvas');
  const ctx          = canvas.getContext('2d');
  const crosshair    = document.getElementById('crosshair');
  const posXEl       = document.getElementById('pos-x');
  const posYEl       = document.getElementById('pos-y');
  const bSlider      = document.getElementById('brightness-slider');
  const bInput       = document.getElementById('brightness-input');
  const lensGroup    = document.getElementById('lens-type-group');
  const panel        = document.getElementById('panel');
  const btnApply     = document.getElementById('btn-apply');
  const btnCancel    = document.getElementById('btn-cancel');
  const btnClose     = document.getElementById('btn-close');
  const btnRestore   = document.getElementById('btn-restore');
  const previewWrap  = document.getElementById('preview-wrap');

  /* ── Helpers ─────────────────────────────────────────────────────────────── */
  function thumbToCanvas(tx, ty) {
    return {
      x: Math.round(tx / THUMB_W * CANVAS_W),
      y: Math.round(ty / THUMB_H * CANVAS_H)
    };
  }

  function canvasToThumb(cx, cy) {
    return {
      x: cx / CANVAS_W * THUMB_W,
      y: cy / CANVAS_H * THUMB_H
    };
  }

  function clamp(v, lo, hi) {
    return Math.max(lo, Math.min(hi, v));
  }

  function updatePositionFromThumb(tx, ty) {
    tx = clamp(tx, 0, THUMB_W);
    ty = clamp(ty, 0, THUMB_H);
    const c = thumbToCanvas(tx, ty);
    flareX = c.x;
    flareY = c.y;
    updateReadouts();
    updateCrosshair();
    drawFlare();
  }

  function updateReadouts() {
    posXEl.value = flareX;
    posYEl.value = flareY;
  }

  function updateCrosshair() {
    const t = canvasToThumb(flareX, flareY);
    crosshair.style.left = t.x + 'px';
    crosshair.style.top  = t.y + 'px';
  }

  function updateSliderFill(slider) {
    const lo  = Number(slider.min);
    const hi  = Number(slider.max);
    const val = Number(slider.value);
    const pct = ((val - lo) / (hi - lo) * 100).toFixed(2) + '%';
    slider.style.setProperty('--pct', pct);
  }

  /* ── Background: dark checkerboard to simulate transparency ──────────────── */
  function drawCheckerboard() {
    const size = 10;
    for (let gy = 0; gy < THUMB_H; gy += size) {
      for (let gx = 0; gx < THUMB_W; gx += size) {
        const even = ((gx / size) + (gy / size)) % 2 === 0;
        ctx.fillStyle = even ? '#1a1a1a' : '#111111';
        ctx.fillRect(gx, gy, size, size);
      }
    }
  }

  /* ── Draw a sample background scene (city silhouette) ────────────────────── */
  function drawScene() {
    // Night sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, THUMB_H);
    sky.addColorStop(0, '#0a0a18');
    sky.addColorStop(1, '#1a1028');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, THUMB_W, THUMB_H);

    // Distant city silhouette
    ctx.fillStyle = '#0c0c14';
    const buildings = [
      [0,  130, 30, 50], [28, 120, 20, 60], [46, 135, 18, 45],
      [62, 110, 25, 70], [85, 125, 15, 55], [98, 115, 22, 65],
      [118,130, 16, 50], [132,105, 30, 75], [160,128, 14, 52],
      [172,118, 24, 62], [194,132, 18, 48], [210,108, 28, 72],
      [236,125, 16, 55], [250,115, 20, 65], [268,130, 12, 50],
    ];
    for (const [bx, by, bw, bh] of buildings) {
      ctx.fillRect(bx, by, bw, bh);
    }
    // Ground
    ctx.fillStyle = '#080810';
    ctx.fillRect(0, THUMB_H * 0.83, THUMB_W, THUMB_H * 0.17);
  }

  /* ── Procedural flare drawing ─────────────────────────────────────────────── */

  function addGlow(x, y, r, color, alpha) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, color.replace('A', String(alpha)));
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  }

  function makeColor(r, g, b, a) {
    return `rgba(${r},${g},${b},${a})`;
  }

  /**
   * Draw a single orb artifact at position (x,y) with radius r and color.
   */
  function drawOrb(x, y, r, rr, gg, bb, alpha) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0,   makeColor(rr, gg, bb, alpha));
    g.addColorStop(0.4, makeColor(rr, gg, bb, alpha * 0.5));
    g.addColorStop(1,   makeColor(rr, gg, bb, 0));
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  }

  /**
   * Draw a ring artifact (thin halo ring) at (x,y).
   */
  function drawRing(x, y, r, rr, gg, bb, alpha, lineWidth) {
    ctx.globalCompositeOperation = 'screen';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.strokeStyle = makeColor(rr, gg, bb, alpha);
    ctx.lineWidth = lineWidth || 1;
    ctx.stroke();
    ctx.globalCompositeOperation = 'source-over';
  }

  /**
   * Compute artifact position along the flare axis.
   * t=0 → center, t=1 → mirrored over center at same dist as source.
   * The "reflection" axis goes from (flareX,flareY) through thumb center.
   */
  function artifactPos(tx, ty, t) {
    const cx = THUMB_W / 2;
    const cy = THUMB_H / 2;
    return {
      x: cx + (cx - tx) * t + (tx - cx) * (1 - t),
      y: cy + (cy - ty) * t + (ty - cy) * (1 - t)
    };
  }

  // Simpler: artifact along the line from flare source through canvas center
  function lensArtifactPos(fx, fy, t) {
    const cx = THUMB_W / 2;
    const cy = THUMB_H / 2;
    return {
      x: fx + (cx - fx) * t * 2,
      y: fy + (cy - fy) * t * 2
    };
  }

  function drawStarburst(fx, fy, size, alpha, spokeCount) {
    const spokes = spokeCount || 8;
    ctx.globalCompositeOperation = 'screen';
    ctx.save();
    ctx.translate(fx, fy);
    for (let i = 0; i < spokes; i++) {
      const angle = (i / spokes) * Math.PI;
      const len   = size * (i % 2 === 0 ? 1.0 : 0.6);
      const grad  = ctx.createLinearGradient(-Math.cos(angle)*len, -Math.sin(angle)*len,
                                              Math.cos(angle)*len,  Math.sin(angle)*len);
      grad.addColorStop(0,   `rgba(255,255,255,0)`);
      grad.addColorStop(0.45, `rgba(255,255,255,${alpha})`);
      grad.addColorStop(0.5,  `rgba(255,255,255,${alpha})`);
      grad.addColorStop(0.55, `rgba(255,255,255,${alpha})`);
      grad.addColorStop(1,   `rgba(255,255,255,0)`);
      ctx.strokeStyle = grad;
      ctx.lineWidth   = 0.8;
      ctx.beginPath();
      ctx.moveTo(-Math.cos(angle)*len, -Math.sin(angle)*len);
      ctx.lineTo( Math.cos(angle)*len,  Math.sin(angle)*len);
      ctx.stroke();
    }
    ctx.restore();
    ctx.globalCompositeOperation = 'source-over';
  }

  function drawHorizontalStreak(fx, fy, alpha) {
    // Anamorphic horizontal streak: thin, intense, teal-blue
    ctx.globalCompositeOperation = 'screen';
    const g = ctx.createLinearGradient(0, fy, THUMB_W, fy);
    g.addColorStop(0,   'rgba(20,120,200,0)');
    g.addColorStop(0.2, `rgba(40,160,255,${alpha * 0.3})`);
    g.addColorStop(0.5, `rgba(80,210,255,${alpha})`);
    g.addColorStop(0.8, `rgba(40,160,255,${alpha * 0.3})`);
    g.addColorStop(1,   'rgba(20,120,200,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, fy - 1, THUMB_W, 2);

    // Slightly wider, softer secondary streak
    const g2 = ctx.createLinearGradient(0, fy, THUMB_W, fy);
    g2.addColorStop(0,   'rgba(20,80,160,0)');
    g2.addColorStop(0.5, `rgba(40,140,220,${alpha * 0.15})`);
    g2.addColorStop(1,   'rgba(20,80,160,0)');
    ctx.fillStyle = g2;
    ctx.fillRect(0, fy - 3, THUMB_W, 6);
    ctx.globalCompositeOperation = 'source-over';
  }

  function drawFlare() {
    ctx.clearRect(0, 0, THUMB_W, THUMB_H);
    drawScene();

    const bFactor = brightness / 100;
    // Convert canvas coords to thumbnail coords
    const fx = flareX / CANVAS_W * THUMB_W;
    const fy = flareY / CANVAS_H * THUMB_H;

    ctx.save();

    switch (lensType) {

      case 'zoom-50-300': {
        // Bright multi-ring halo, large central hot spot, scattered secondary glints
        // Central bloom
        drawOrb(fx, fy, 50 * bFactor, 255, 240, 200, 0.85 * Math.min(bFactor, 1.5));
        drawOrb(fx, fy, 20 * bFactor, 255, 255, 255, 0.95 * Math.min(bFactor, 1.5));
        // Rings
        drawRing(fx, fy, 28 * bFactor, 200, 180, 100, 0.55 * bFactor, 1.2);
        drawRing(fx, fy, 40 * bFactor, 180, 160, 80,  0.35 * bFactor, 0.9);
        drawRing(fx, fy, 55 * bFactor, 160, 200, 255, 0.25 * bFactor, 0.8);
        // Artifact chain
        const arts = [0.35, 0.55, 0.70, 0.85, 1.0, 1.2, 1.4];
        const aColors = [
          [100, 160, 255], [200, 100, 80], [80, 200, 160],
          [200, 180, 80],  [100, 200, 255], [160, 80, 200], [255, 200, 100]
        ];
        arts.forEach((t, i) => {
          const p = lensArtifactPos(fx, fy, t);
          const c = aColors[i % aColors.length];
          const r = (10 - i) * bFactor + 3;
          drawOrb(p.x, p.y, Math.max(r, 3), c[0], c[1], c[2], 0.45 * bFactor);
          if (i % 2 === 0) drawRing(p.x, p.y, r * 1.4, c[0], c[1], c[2], 0.3 * bFactor, 0.7);
        });
        break;
      }

      case 'prime-35': {
        // Clean starburst, minimal artifacts
        drawOrb(fx, fy, 30 * bFactor, 255, 255, 240, 0.8 * Math.min(bFactor, 1.5));
        drawOrb(fx, fy, 10 * bFactor, 255, 255, 255, 1.0 * Math.min(bFactor, 1.5));
        drawStarburst(fx, fy, 55 * bFactor, 0.6 * bFactor, 8);
        // Subtle ring
        drawRing(fx, fy, 22 * bFactor, 220, 220, 255, 0.3 * bFactor, 0.8);
        // Only 2 faint artifacts
        [0.5, 0.9].forEach((t, i) => {
          const p = lensArtifactPos(fx, fy, t);
          drawOrb(p.x, p.y, 5 * bFactor, 200, 210, 255, 0.25 * bFactor);
        });
        break;
      }

      case 'prime-105': {
        // Wide soft halo, warm color tint, gentle and diffused
        // Big soft warm glow
        drawOrb(fx, fy, 70 * bFactor, 255, 200, 100, 0.5 * bFactor);
        drawOrb(fx, fy, 40 * bFactor, 255, 220, 140, 0.65 * bFactor);
        drawOrb(fx, fy, 18 * bFactor, 255, 250, 220, 0.9 * Math.min(bFactor, 1.5));
        drawOrb(fx, fy,  8 * bFactor, 255, 255, 255, 1.0 * Math.min(bFactor, 1.5));
        // Warm diffuse ring
        drawRing(fx, fy, 55 * bFactor, 255, 180, 80, 0.2 * bFactor, 1.5);
        drawRing(fx, fy, 72 * bFactor, 255, 160, 60, 0.1 * bFactor, 1.2);
        // Soft secondary orbs, warm tinted
        [0.4, 0.65, 0.9].forEach((t) => {
          const p = lensArtifactPos(fx, fy, t);
          drawOrb(p.x, p.y, 9 * bFactor, 255, 180, 80, 0.3 * bFactor);
        });
        break;
      }

      case 'movie-prime': {
        // Strong central bloom, pronounced artifact chain, neutral tone
        drawOrb(fx, fy, 55 * bFactor, 230, 230, 255, 0.7 * bFactor);
        drawOrb(fx, fy, 22 * bFactor, 255, 255, 255, 1.0 * Math.min(bFactor, 1.5));
        drawOrb(fx, fy,  8 * bFactor, 255, 255, 255, 1.0 * Math.min(bFactor, 1.5));
        // Prominent artifact chain with larger orbs
        const mArts  = [0.3, 0.5, 0.65, 0.80, 0.95, 1.1, 1.25, 1.45];
        const mColors = [
          [200, 200, 255], [180, 255, 200], [255, 200, 180],
          [200, 180, 255], [255, 255, 180], [180, 200, 255],
          [255, 180, 200], [200, 255, 255]
        ];
        mArts.forEach((t, i) => {
          const p = lensArtifactPos(fx, fy, t);
          const c = mColors[i % mColors.length];
          const r = (12 - i * 0.5) * bFactor;
          drawOrb(p.x, p.y, Math.max(r, 4), c[0], c[1], c[2], 0.55 * bFactor);
          drawRing(p.x, p.y, r * 1.5, c[0], c[1], c[2], 0.25 * bFactor, 0.8);
        });
        break;
      }

      case 'anamorphic': {
        // Intense horizontal blue/teal streak, strong elliptical rings, high-contrast bloom
        drawHorizontalStreak(fx, fy, Math.min(bFactor * 0.85, 1.0));

        // Strong teal-blue bloom
        drawOrb(fx, fy, 55 * bFactor, 40, 160, 255, 0.7 * bFactor);
        drawOrb(fx, fy, 22 * bFactor, 100, 220, 255, 0.9 * Math.min(bFactor, 1.5));
        drawOrb(fx, fy,  8 * bFactor, 200, 240, 255, 1.0 * Math.min(bFactor, 1.5));

        // Elliptical rings distributed along horizontal axis
        const anaRings = [-70, -45, -25, 25, 45, 70];
        anaRings.forEach((dx) => {
          const rx = fx + dx * bFactor;
          ctx.globalCompositeOperation = 'screen';
          ctx.beginPath();
          ctx.ellipse(rx, fy, Math.abs(dx) * 0.4 * bFactor + 6, (Math.abs(dx) * 0.15 + 5) * bFactor, 0, 0, Math.PI * 2);
          ctx.strokeStyle = makeColor(60, 180, 255, 0.35 * bFactor);
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.globalCompositeOperation = 'source-over';
          drawOrb(rx, fy, (8 - Math.abs(dx) * 0.05) * bFactor, 40, 160, 255, 0.4 * bFactor);
        });

        // Starburst with 4 main spokes (anamorphic character)
        drawStarburst(fx, fy, 50 * bFactor, 0.5 * bFactor, 4);
        break;
      }
    }

    ctx.restore();
  }

  /* ── Init ─────────────────────────────────────────────────────────────────── */
  updateReadouts();
  updateCrosshair();
  updateSliderFill(bSlider);
  drawFlare();

  /* ── Preview interaction: click / drag ──────────────────────────────────── */
  function getThumbCoords(e) {
    const rect = previewWrap.getBoundingClientRect();
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }

  previewWrap.addEventListener('mousedown', function (e) {
    if (e.button !== 0) return;
    dragging = true;
    const p = getThumbCoords(e);
    updatePositionFromThumb(p.x, p.y);
    e.preventDefault();
  });

  document.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    const p = getThumbCoords(e);
    updatePositionFromThumb(p.x, p.y);
  });

  document.addEventListener('mouseup', function (e) {
    if (e.button !== 0) return;
    dragging = false;
  });

  /* ── Lens type selection ─────────────────────────────────────────────────── */
  lensGroup.addEventListener('click', function (e) {
    const option = e.target.closest('.radio-option');
    if (!option) return;

    // Deactivate all
    lensGroup.querySelectorAll('.radio-option').forEach(function (o) {
      o.classList.remove('active');
      o.setAttribute('aria-checked', 'false');
    });

    // Activate selected
    option.classList.add('active');
    option.setAttribute('aria-checked', 'true');
    lensType = option.dataset.type;
    drawFlare();
  });

  lensGroup.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') {
      const option = e.target.closest('.radio-option');
      if (option) option.click();
    }
  });

  /* ── Brightness slider + input ───────────────────────────────────────────── */
  function scheduleBrightnessUpdate() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function () {
      drawFlare();
    }, 150);
  }

  bSlider.addEventListener('input', function () {
    brightness = Number(bSlider.value);
    bInput.value = brightness;
    updateSliderFill(bSlider);
    scheduleBrightnessUpdate();
  });

  bInput.addEventListener('change', function () {
    let v = parseInt(bInput.value, 10);
    if (isNaN(v)) v = 100;
    v = clamp(v, 10, 300);
    brightness = v;
    bInput.value = v;
    bSlider.value = v;
    updateSliderFill(bSlider);
    scheduleBrightnessUpdate();
  });

  bInput.addEventListener('blur', function () {
    let v = parseInt(bInput.value, 10);
    if (isNaN(v)) v = 100;
    v = clamp(v, 10, 300);
    brightness = v;
    bInput.value = v;
    bSlider.value = v;
    updateSliderFill(bSlider);
    drawFlare();
  });

  /* ── Apply / Cancel ──────────────────────────────────────────────────────── */
  function dismiss() {
    panel.classList.add('dismissed');
    btnRestore.classList.remove('hidden');
  }

  btnApply.addEventListener('click',  dismiss);
  btnCancel.addEventListener('click', dismiss);
  btnClose.addEventListener('click',  dismiss);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && !panel.classList.contains('dismissed')) {
      dismiss();
    }
  });

  btnRestore.addEventListener('click', function () {
    panel.classList.remove('dismissed');
    btnRestore.classList.add('hidden');
  });

})();
</script>
</body>
</html>
